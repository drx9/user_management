version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: user_management_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: user-management
    volumes:
      - mongo_data:/data/db
    networks:
      - user_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: user_management_backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/user-management
      JWT_SECRET: your_jwt_secret_key_change_in_production
      JWT_EXPIRE: 7d
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - user_network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: user_management_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - user_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:

networks:
  user_network:
    driver: bridge
